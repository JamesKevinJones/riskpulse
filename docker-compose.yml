services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - riskpulse-data:/app/data
      - ./backend/models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  riskpulse-data:
